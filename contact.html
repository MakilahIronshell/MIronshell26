<article id="main">

<h2>Contact</h2>

<p>Let’s capture memories that last a lifetime.</p>

<form id="contactForm" action="#" method="post">
   
   <fieldset id="clientInfo">
      <legend>Client Information</legend>

      <div class="formRow">
         <label for="name">Name</label>
         <input type="text" name="name" id="name" placeholder="first and last name" />
      </div>

      <div class="formRow">
         <label for="email">E-mail</label>
         <input type="email" name="email" id="email" placeholder="example@email.com" />
      </div>

      <div class="formRow">
         <label for="phone">Phone Number</label>
         <input type="tel" name="phone" id="phone" placeholder="(xxx) xxx-xxxx" />
      </div>
      <div class="formRow">
        <label for="street">Street Address</label>
        <input type="street" name="street address" id="street address" />
      </div>
      <div class="formRow">
        <label for="state">State</label>
        <input type="state" name="state" id="state" />
      </div>
      <div class="formRow">
        <label for="zipcode">zipcode</label>
        <input type="zipcode" name="zipcode" id="zipcode" />
      </div>
   </fieldset>

   <fieldset id="sessionInfo">
      <legend>Session Information</legend>

      <div class="formRow">
         <label for="session">Session Type</label>
         <select name="session" id="session">
            <option>Family</option>
            <option>Extended Family</option>
            <option>Maternity</option>
            <option>Wedding</option>
            <option>Couple</option>
            <option>Senior</option>
            <option>Milestone</option>
            <option>Portraits</option>
         </select>
      </div>

      <textarea name="message" id="message" rows="5" cols="30" placeholder="Tell me a little about what you are looking for"></textarea>

      <div id="buttons">
         <input type="submit" value="Send" />
         <input type="reset" value="Clear" />
      </div>
   </fieldset>

</form>
